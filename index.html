<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">

    <!-- Updated viewport for locked desktop scaling -->
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">

    <title>SCOTTSON'S ANALYTICS DASHBOARD</title>

    <!-- Styles -->
    <link rel="stylesheet" href="styles.css">

    <!-- Chart.js -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body>

    <!-- APP SHELL -->
    <div class="app-shell">

        <!-- TOP BAR -->
        <header class="top-bar">
            <div class="top-left">
                <h1>SCOTTSON'S ANALYTICS DASHBOARD</h1>
                <span class="subtitle">Fashion Contact Center Performance Overview</span>
            </div>
        </header>

        <!-- CONTROL STRIP -->
        <section class="control-bar">

            <select id="filter-program">
                <option value="">Business</option>
            </select>

            <select id="filter-day">
                <option value="">Day</option>
            </select>

            <select id="filter-month">
                <option value="">Month</option>
            </select>

            <select id="filter-year">
                <option value="">Year</option>
            </select>

            <select id="filter-quarter">
                <option value="">Quarter</option>
            </select>

            <div class="date-controls">
                <span>From</span>
                <input type="date" id="filter-date-start">
                <span>To</span>
                <input type="date" id="filter-date-end">
                <button id="filter-reset" type="button">Reset</button>
            </div>

        </section>

        <section class="active-filters" id="active-filters"></section>

        <main class="dashboard-grid">

            <!-- LEFT PANEL -->
            <section class="panel left-panel">
                <div class="panel-header">
                    <h2>Scorecards</h2>
                    <span class="panel-subtitle">Business KPIs</span>
                </div>
                <div id="kpi-container" class="compact-kpi-grid"></div>
            </section>

            <!-- RIGHT PANEL -->
            <section class="panel right-panel">
                <div class="panel-header">
                    <h2>Performance by Business</h2>
                    <span class="panel-subtitle">Volume, Service, and Efficiency</span>
                </div>

                <div class="right-grid">

                    <div class="chart-card">
                        <h3 class="chart-title-sm">Answered Contacts by Business</h3>
                        <div class="chart-inner">
                            <canvas id="lobChart"></canvas>
                        </div>
                    </div>

                    <div class="chart-card">
                        <h3 class="chart-title-sm">Volume Trend</h3>
                        <div class="chart-inner">
                            <canvas id="volumeTrendChart"></canvas>
                        </div>
                    </div>

                    <div class="chart-card">
                        <h3 class="chart-title-sm">Service Level &amp; Abandon %</h3>
                        <div class="chart-inner">
                            <canvas id="slAbnTrendChart"></canvas>
                        </div>
                    </div>

                    <div class="chart-card">
                        <h3 class="chart-title-sm">Average Handle Time by Business</h3>
                        <div class="chart-inner">
                            <canvas id="ahtChart"></canvas>
                        </div>
                    </div>

                </div>
            </section>

        </main>

        <div class="alerts-container" id="alerts"></div>

    </div>

    <script src="script.js"></script>
</body>
</html>
