<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LQS Dashboard</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="dashboard">
        <!-- Header with timestamp & exports -->
        <header>
            <h1>LQS Dashboard</h1>
            <div class="status-bar">
                <div id="status-pill" class="status-pill loading">Loading latest data…</div>
                <div class="export-buttons">
                    <button id="download-png" class="btn btn-primary">📊 PNG</button>
                    <button id="download-pdf" class="btn btn-secondary">📄 PDF</button>
                </div>
            </div>
        </header>

        <!-- KPI Cards -->
        <section class="kpi-section">
            <div id="kpi-container"></div>
        </section>

        <!-- Charts Grid -->
        <section class="charts-grid">
            <div class="chart-card">
                <h3>Answered by Business</h3>
                <canvas id="lobChart"></canvas>
            </div>
            <div class="chart-card">
                <h3>Volume Trends</h3>
                <canvas id="volumeTrendChart"></canvas>
            </div>
            <div class="chart-card">
                <h3>Service Level & Abandon %</h3>
                <canvas id="slAbnTrendChart"></canvas>
            </div>
            <div class="chart-card">
                <h3>AHT by Business</h3>
                <canvas id="ahtChart"></canvas>
            </div>
        </section>

        <!-- Filters Section -->
        <section class="filters-section">
            <h2>Filters</h2>
            <div class="filters-grid">
                <div class="filter-group">
                    <label>Business</label>
                    <select id="filter-program" multiple size="4"></select>
                </div>
                <div class="filter-group">
                    <label>Day</label>
                    <select id="filter-day" multiple size="4"></select>
                </div>
                <div class="filter-group">
                    <label>Month</label>
                    <select id="filter-month" multiple size="4"></select>
                </div>
                <div class="filter-group">
                    <label>Year</label>
                    <select id="filter-year" multiple size="4"></select>
                </div>
                <div class="filter-group">
                    <label>Quarter</label>
                    <select id="filter-quarter" multiple size="4"></select>
                </div>
                <div class="filter-group">
                    <label>Date Range</label>
                    <div class="date-inputs">
                        <input type="date" id="filter-date-start">
                        <input type="date" id="filter-date-end">
                    </div>
                </div>
            </div>
            <div class="filter-actions">
                <button id="filter-reset" class="btn btn-secondary">Reset Filters</button>
                <button id="filter-apply" class="btn btn-primary">Apply Filters</button>
            </div>
        </section>
    </div>

    <!-- Alerts -->
    <div id="alerts" class="alerts-container"></div>

    <script src="script.js"></script>
</body>
</html>
